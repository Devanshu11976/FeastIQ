<svg width="1100" height="160" viewBox="0 0 1100 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a93a8"/>
    </marker>
  </defs>

  <style>
    .box { font-family: Verdana, Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .label { fill: #0f1226; }
  </style>

  <!-- connecting line -->
  <line x1="95" y1="80" x2="1010" y2="80" stroke="#8a93a8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Cart -->
  <rect x="10" y="55" width="135" height="50" rx="10" fill="#7C9CFF" stroke="#5C7CFA" stroke-width="1.5"/>
  <text x="77" y="85" text-anchor="middle" class="box label">🛒 Cart</text>

  <!-- Order Placed -->
  <rect x="165" y="55" width="150" height="50" rx="10" fill="#7C9CFF" stroke="#5C7CFA" stroke-width="1.5"/>
  <text x="240" y="85" text-anchor="middle" class="box label">📤 Order Placed</text>

  <!-- Confirmed -->
  <rect x="335" y="55" width="140" height="50" rx="10" fill="#7C9CFF" stroke="#5C7CFA" stroke-width="1.5"/>
  <text x="405" y="85" text-anchor="middle" class="box label">✅ Confirmed</text>

  <!-- Preparing -->
  <rect x="495" y="55" width="140" height="50" rx="10" fill="#9D8CFF" stroke="#7B61FF" stroke-width="1.5"/>
  <text x="565" y="85" text-anchor="middle" class="box label">👨‍🍳 Preparing</text>

  <!-- Ready -->
  <rect x="655" y="55" width="115" height="50" rx="10" fill="#9D8CFF" stroke="#7B61FF" stroke-width="1.5"/>
  <text x="712" y="85" text-anchor="middle" class="box label">📦 Ready</text>

  <!-- Delivered -->
  <rect x="790" y="55" width="140" height="50" rx="10" fill="#5EE7C8" stroke="#4FD1B8" stroke-width="1.5"/>
  <text x="860" y="85" text-anchor="middle" class="box label">🚚 Delivered</text>

  <!-- Feedback -->
  <rect x="950" y="55" width="135" height="50" rx="10" fill="#7C9CFF" stroke="#5C7CFA" stroke-width="1.5"/>
  <text x="1017" y="85" text-anchor="middle" class="box label">⭐ Feedback</text>
</svg>
