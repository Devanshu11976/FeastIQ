<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeastIQ - Order Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .status-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .progress {
            height: 30px;
            border-radius: 15px;
            background-color: #e9ecef;
        }
        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-weight: bold;
        }
        .status-step {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            transition: all 0.3s;
        }
        .step-icon.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .step-icon.completed {
            background: #28a745;
            color: white;
        }
        .step-label {
            font-weight: 500;
        }
        .order-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .feedback-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
        }
        .feedback-btn:hover {
            transform: scale(1.05);
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-utensils me-2"></i>FeastIQ
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="status-card">
                    <h2 class="mb-4"><i class="fas fa-clock me-2"></i>Order Status</h2>
                    
                    <div id="order-info">
                        <div class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                    
                    <div id="status-steps" class="mt-4" style="display: none;">
                        <div class="status-step">
                            <div class="step-icon" id="step-pending">
                                <i class="fas fa-receipt"></i>
                            </div>
                            <span class="step-label">Pending</span>
                        </div>
                        <div class="status-step">
                            <div class="step-icon" id="step-confirmed">
                                <i class="fas fa-check"></i>
                            </div>
                            <span class="step-label">Confirmed</span>
                        </div>
                        <div class="status-step">
                            <div class="step-icon" id="step-preparing">
                                <i class="fas fa-fire"></i>
                            </div>
                            <span class="step-label">Preparing</span>
                        </div>
                        <div class="status-step">
                            <div class="step-icon" id="step-ready">
                                <i class="fas fa-bell"></i>
                            </div>
                            <span class="step-label">Ready</span>
                        </div>
                        <div class="status-step">
                            <div class="step-icon" id="step-delivered">
                                <i class="fas fa-truck"></i>
                            </div>
                            <span class="step-label">Delivered</span>
                        </div>
                    </div>
                    
                    <div id="feedback-section" class="mt-4 text-center" style="display: none;">
                        <button class="btn feedback-btn" onclick="goToFeedback()">
                            <i class="fas fa-star me-2"></i>Rate Your Order
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000';
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        
        const statusOrder = ['pending', 'confirmed', 'preparing', 'ready', 'delivered'];
        
        async function loadOrderStatus() {
            if (!orderId) {
                document.getElementById('order-info').innerHTML = `
                    <div class="alert alert-danger">No order ID provided</div>
                `;
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/orders/${orderId}`);
                const data = await response.json();
                
                if (response.ok) {
                    displayOrder(data);
                } else {
                    document.getElementById('order-info').innerHTML = `
                        <div class="alert alert-danger">${data.error || 'Error loading order'}</div>
                    `;
                }
            } catch (error) {
                console.error('Error loading order:', error);
                document.getElementById('order-info').innerHTML = `
                    <div class="alert alert-danger">Error loading order. Please try again.</div>
                `;
            }
        }
        
        function displayOrder(order) {
            const currentStatusIndex = statusOrder.indexOf(order.status);
            
            document.getElementById('order-info').innerHTML = `
                <div class="mb-3">
                    <strong>Order ID:</strong> #${order.id}
                </div>
                <div class="mb-3">
                    <strong>Status:</strong> 
                    <span class="badge bg-primary text-uppercase">${order.status}</span>
                </div>
                <div class="mb-3">
                    <strong>Total:</strong> ₹${order.total_amount}
                </div>
                <h5 class="mt-4 mb-3">Order Items</h5>
                ${order.items.map(item => `
                    <div class="order-item">
                        <div class="d-flex justify-content-between">
                            <span>${item.menu_item_name} x ${item.quantity}</span>
                            <span>₹${item.subtotal}</span>
                        </div>
                    </div>
                `).join('')}
            `;
            
            document.getElementById('status-steps').style.display = 'block';
            
            // Update status steps
            statusOrder.forEach((status, index) => {
                const stepIcon = document.getElementById(`step-${status}`);
                stepIcon.classList.remove('active', 'completed');
                
                if (index < currentStatusIndex) {
                    stepIcon.classList.add('completed');
                } else if (index === currentStatusIndex) {
                    stepIcon.classList.add('active');
                }
            });
            
            // Show feedback button if delivered
            if (order.status === 'delivered') {
                document.getElementById('feedback-section').style.display = 'block';
            }
        }
        
        function goToFeedback() {
            window.location.href = `feedback.html?order_id=${orderId}`;
        }
        
        // Load order status
        loadOrderStatus();
        
        // Poll every 10 seconds
        setInterval(loadOrderStatus, 10000);
    </script>
</body>
</html>
