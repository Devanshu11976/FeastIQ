<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeastIQ - Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .menu-card {
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .menu-card img {
            height: 180px;
            object-fit: cover;
        }
        .card-body {
            padding: 1.25rem;
        }
        .menu-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .menu-price {
            color: #667eea;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .add-to-cart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 8px 20px;
            color: white;
            font-weight: 500;
            transition: all 0.3s;
        }
        .add-to-cart-btn:hover {
            transform: scale(1.05);
            color: white;
        }
        .cart-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.3s;
        }
        .cart-float:hover {
            transform: scale(1.1);
        }
        .cart-count {
            background: #ff4757;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-utensils me-2"></i>FeastIQ
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div id="menu-container">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="cart-float" onclick="goToOrder()">
        <i class="fas fa-shopping-cart me-2"></i>Cart
        <span class="cart-count" id="cart-count">0</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000';
        
        async function loadMenu() {
            try {
                const response = await fetch(`${API_URL}/menu`);
                const menuData = await response.json();
                
                const container = document.getElementById('menu-container');
                container.innerHTML = '';
                
                for (const [category, items] of Object.entries(menuData)) {
                    const section = document.createElement('div');
                    section.className = 'category-section';
                    
                    section.innerHTML = `
                        <h2 class="category-title">${category}</h2>
                        <div class="row">
                            ${items.map(item => `
                                <div class="col-md-4 col-lg-3 mb-4">
                                    <div class="card menu-card h-100">
                                        <div class="card-body">
                                            <h5 class="menu-name">${item.name}</h5>
                                            <p class="menu-price">₹${item.price}</p>
                                            <button class="btn add-to-cart-btn w-100" onclick="addToCart(${item.id}, '${item.name}', ${item.price})">
                                                <i class="fas fa-plus me-2"></i>Add to Cart
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    
                    container.appendChild(section);
                }
            } catch (error) {
                console.error('Error loading menu:', error);
                document.getElementById('menu-container').innerHTML = `
                    <div class="alert alert-danger">Error loading menu. Please try again.</div>
                `;
            }
        }
        
        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            const existingItem = cart.find(item => item.menu_item_id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ menu_item_id: id, name: name, price: price, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }
        
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }
        
        function goToOrder() {
            window.location.href = 'order.html';
        }
        
        // Initialize
        loadMenu();
        updateCartCount();
    </script>
</body>
</html>
