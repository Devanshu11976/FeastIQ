<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeastIQ - Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .feedback-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            font-size: 2rem;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffc107;
        }
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: scale(1.02);
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-utensils me-2"></i>FeastIQ
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="feedback-card">
                    <h2 class="text-center mb-4"><i class="fas fa-star me-2"></i>Rate Your Order</h2>
                    
                    <div id="order-info" class="mb-4">
                        <!-- Order info will be loaded here -->
                    </div>
                    
                    <form id="feedback-form">
                        <div class="star-rating">
                            <input type="radio" id="star5" name="rating" value="5" required>
                            <label for="star5"><i class="fas fa-star"></i></label>
                            
                            <input type="radio" id="star4" name="rating" value="4">
                            <label for="star4"><i class="fas fa-star"></i></label>
                            
                            <input type="radio" id="star3" name="rating" value="3">
                            <label for="star3"><i class="fas fa-star"></i></label>
                            
                            <input type="radio" id="star2" name="rating" value="2">
                            <label for="star2"><i class="fas fa-star"></i></label>
                            
                            <input type="radio" id="star1" name="rating" value="1">
                            <label for="star1"><i class="fas fa-star"></i></label>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Comment (Optional)</label>
                            <textarea class="form-control" id="comment" rows="4" placeholder="Tell us about your experience..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn submit-btn">
                            <i class="fas fa-paper-plane me-2"></i>Submit Feedback
                        </button>
                    </form>
                    
                    <div id="success-message" class="alert alert-success mt-4" style="display: none;">
                        <i class="fas fa-check-circle me-2"></i>Thank you for your feedback!
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000';
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        const customerEmail = localStorage.getItem('last_order_email');
        
        async function loadOrderInfo() {
            if (!orderId) {
                document.getElementById('order-info').innerHTML = `
                    <div class="alert alert-danger">No order ID provided</div>
                `;
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/orders/${orderId}`);
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('order-info').innerHTML = `
                        <div class="text-center">
                            <p class="mb-0"><strong>Order #${data.id}</strong></p>
                            <p class="text-muted mb-0">Total: ₹${data.total_amount}</p>
                        </div>
                    `;
                } else {
                    document.getElementById('order-info').innerHTML = `
                        <div class="alert alert-danger">${data.error || 'Error loading order'}</div>
                    `;
                }
            } catch (error) {
                console.error('Error loading order:', error);
            }
        }
        
        async function submitFeedback(e) {
            e.preventDefault();
            
            if (!orderId || !customerEmail) {
                alert('Order information missing');
                return;
            }
            
            const rating = document.querySelector('input[name="rating"]:checked');
            if (!rating) {
                alert('Please select a rating');
                return;
            }
            
            const comment = document.getElementById('comment').value;
            
            try {
                const response = await fetch(`${API_URL}/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        order_id: parseInt(orderId),
                        customer_email: customerEmail,
                        rating: parseInt(rating.value),
                        comment: comment
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('feedback-form').style.display = 'none';
                    document.getElementById('success-message').style.display = 'block';
                } else {
                    alert(data.error || 'Error submitting feedback');
                }
            } catch (error) {
                console.error('Error submitting feedback:', error);
                alert('Error submitting feedback. Please try again.');
            }
        }
        
        // Initialize
        loadOrderInfo();
        document.getElementById('feedback-form').addEventListener('submit', submitFeedback);
    </script>
</body>
</html>
