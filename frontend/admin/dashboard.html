<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeastIQ - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .nav-link {
            color: rgba(255,255,255,0.8) !important;
            transition: color 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            color: white !important;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        .chart-title {
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-utensils me-2"></i>FeastIQ Admin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders.html">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="feedback.html">Feedback</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="customers.html">Customers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Dashboard Overview</h2>
        
        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon me-3" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-0">Total Orders</h6>
                            <h4 class="mb-0" id="total-orders">-</h4>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon me-3" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <i class="fas fa-star"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-0">Avg Rating</h6>
                            <h4 class="mb-0" id="avg-rating">-</h4>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon me-3" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                            <i class="fas fa-users"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-0">VIP Customers</h6>
                            <h4 class="mb-0" id="vip-customers">-</h4>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon me-3" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                            <i class="fas fa-rupee-sign"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-0">Avg Order Value</h6>
                            <h4 class="mb-0" id="avg-order-value">-</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="row">
            <div class="col-lg-6">
                <div class="chart-card">
                    <h5 class="chart-title">Daily Orders (Last 30 Days)</h5>
                    <canvas id="dailyOrdersChart"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-card">
                    <h5 class="chart-title">Rating Distribution</h5>
                    <canvas id="ratingDistributionChart"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-card">
                    <h5 class="chart-title">Customer Segments</h5>
                    <canvas id="segmentsChart"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-card">
                    <h5 class="chart-title">Top 5 Popular Items</h5>
                    <canvas id="popularItemsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000';
        let token = localStorage.getItem('admin_token');
        
        if (!token) {
            window.location.href = 'login.html';
        }
        
        async function loadAnalytics() {
            try {
                const headers = { 'Authorization': `Bearer ${token}` };
                
                // Load order analytics
                const orderRes = await fetch(`${API_URL}/analytics/orders`, { headers });
                const orderData = await orderRes.json();
                
                // Load feedback analytics
                const feedbackRes = await fetch(`${API_URL}/analytics/feedback`, { headers });
                const feedbackData = await feedbackRes.json();
                
                // Load segment analytics
                const segmentRes = await fetch(`${API_URL}/analytics/segments`, { headers });
                const segmentData = await segmentRes.json();
                
                // Update stats
                document.getElementById('avg-rating').textContent = feedbackData.avg_rating;
                document.getElementById('vip-customers').textContent = segmentData.VIP || 0;
                document.getElementById('avg-order-value').textContent = '₹' + orderData.avg_order_value;
                
                // Daily Orders Chart
                const dailyOrdersCtx = document.getElementById('dailyOrdersChart').getContext('2d');
                new Chart(dailyOrdersCtx, {
                    type: 'line',
                    data: {
                        labels: Object.keys(orderData.daily_orders),
                        datasets: [{
                            label: 'Orders',
                            data: Object.values(orderData.daily_orders),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } }
                    }
                });
                
                // Rating Distribution Chart
                const ratingCtx = document.getElementById('ratingDistributionChart').getContext('2d');
                new Chart(ratingCtx, {
                    type: 'bar',
                    data: {
                        labels: ['1 Star', '2 Stars', '3 Stars', '4 Stars', '5 Stars'],
                        datasets: [{
                            label: 'Count',
                            data: [
                                feedbackData.rating_distribution[1] || 0,
                                feedbackData.rating_distribution[2] || 0,
                                feedbackData.rating_distribution[3] || 0,
                                feedbackData.rating_distribution[4] || 0,
                                feedbackData.rating_distribution[5] || 0
                            ],
                            backgroundColor: ['#ff4757', '#ffa502', '#ffdd59', '#2ed573', '#1e90ff']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } }
                    }
                });
                
                // Segments Chart
                const segmentsCtx = document.getElementById('segmentsChart').getContext('2d');
                new Chart(segmentsCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['VIP', 'Regular', 'Occasional', 'Inactive'],
                        datasets: [{
                            data: [
                                segmentData.VIP || 0,
                                segmentData.Regular || 0,
                                segmentData.Occasional || 0,
                                segmentData.Inactive || 0
                            ],
                            backgroundColor: ['#667eea', '#f093fb', '#4facfe', '#e0e0e0']
                        }]
                    },
                    options: {
                        responsive: true
                    }
                });
                
                // Popular Items Chart
                const popularCtx = document.getElementById('popularItemsChart').getContext('2d');
                new Chart(popularCtx, {
                    type: 'bar',
                    data: {
                        labels: orderData.popular_items.map(item => item.name),
                        datasets: [{
                            label: 'Quantity',
                            data: orderData.popular_items.map(item => item.quantity),
                            backgroundColor: '#667eea'
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        plugins: { legend: { display: false } }
                    }
                });
                
            } catch (error) {
                console.error('Error loading analytics:', error);
            }
        }
        
        function logout() {
            localStorage.removeItem('admin_token');
            window.location.href = 'login.html';
        }
        
        // Load analytics on page load
        loadAnalytics();
    </script>
</body>
</html>
