<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeastIQ - Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .nav-link {
            color: rgba(255,255,255,0.8) !important;
        }
        .nav-link:hover, .nav-link.active {
            color: white !important;
        }
        .customers-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .segment-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .segment-VIP { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .segment-Regular { background: #4facfe; color: white; }
        .segment-Occasional { background: #43e97b; color: white; }
        .segment-Inactive { background: #e0e0e0; color: #333; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-utensils me-2"></i>FeastIQ Admin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders.html">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="feedback.html">Feedback</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="customers.html">Customers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Customer Segments</h2>
        
        <div class="mb-3">
            <button class="btn btn-primary" onclick="refreshSegments()">
                <i class="fas fa-sync-alt me-2"></i>Refresh Segments
            </button>
        </div>
        
        <div class="customers-card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Segment</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody id="customers-table">
                        <tr>
                            <td colspan="6" class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000';
        let token = localStorage.getItem('admin_token');
        
        if (!token) {
            window.location.href = 'login.html';
        }
        
        async function loadCustomers() {
            try {
                // First trigger segmentation to get latest data
                await fetch(`${API_URL}/analytics/segments`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                // Then load customers from orders (we'll get customer data from orders)
                const headers = { 'Authorization': `Bearer ${token}` };
                const response = await fetch(`${API_URL}/orders?page=1&per_page=100`, { headers });
                const data = await response.json();
                
                // Extract unique customers from orders
                const customersMap = new Map();
                data.orders.forEach(order => {
                    if (!customersMap.has(order.customer_email)) {
                        customersMap.set(order.customer_email, {
                            id: order.customer_id,
                            email: order.customer_email,
                            phone: order.customer_phone,
                            segment: 'Occasional' // Default, will be updated by segmentation
                        });
                    }
                });
                
                const customers = Array.from(customersMap.values());
                
                const tbody = document.getElementById('customers-table');
                
                if (customers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No customers found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = customers.map(customer => `
                    <tr>
                        <td>${customer.id}</td>
                        <td>-</td>
                        <td>${customer.email}</td>
                        <td>${customer.phone}</td>
                        <td>
                            <span class="segment-badge segment-${customer.segment}">${customer.segment}</span>
                        </td>
                        <td>-</td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Error loading customers:', error);
            }
        }
        
        async function refreshSegments() {
            try {
                const headers = { 'Authorization': `Bearer ${token}` };
                await fetch(`${API_URL}/analytics/segments`, { headers });
                alert('Segments refreshed successfully!');
                loadCustomers();
            } catch (error) {
                console.error('Error refreshing segments:', error);
                alert('Error refreshing segments');
            }
        }
        
        function logout() {
            localStorage.removeItem('admin_token');
            window.location.href = 'login.html';
        }
        
        // Load customers on page load
        loadCustomers();
    </script>
</body>
</html>
