<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeastIQ - Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .nav-link {
            color: rgba(255,255,255,0.8) !important;
        }
        .nav-link:hover, .nav-link.active {
            color: white !important;
        }
        .orders-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-pending { background: #ffc107; color: #000; }
        .status-confirmed { background: #17a2b8; color: white; }
        .status-preparing { background: #fd7e14; color: white; }
        .status-ready { background: #28a745; color: white; }
        .status-delivered { background: #6c757d; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-utensils me-2"></i>FeastIQ Admin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="orders.html">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="feedback.html">Feedback</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="customers.html">Customers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Orders Management</h2>
        
        <div class="orders-card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table">
                        <tr>
                            <td colspan="6" class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center" id="pagination">
                </ul>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000';
        let token = localStorage.getItem('admin_token');
        let currentPage = 1;
        
        if (!token) {
            window.location.href = 'login.html';
        }
        
        async function loadOrders(page = 1) {
            try {
                const headers = { 'Authorization': `Bearer ${token}` };
                const response = await fetch(`${API_URL}/orders?page=${page}&per_page=10`, { headers });
                const data = await response.json();
                
                const tbody = document.getElementById('orders-table');
                
                if (data.orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No orders found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.orders.map(order => `
                    <tr>
                        <td><strong>#${order.id}</strong></td>
                        <td>
                            <div>${order.customer_email || '-'}</div>
                            <small class="text-muted">${order.customer_phone || '-'}</small>
                        </td>
                        <td>
                            ${order.items.map(item => `
                                <div>${item.menu_item_name} x ${item.quantity}</div>
                            `).join('')}
                        </td>
                        <td><strong>₹${order.total_amount}</strong></td>
                        <td>
                            <span class="status-badge status-${order.status}">${order.status}</span>
                        </td>
                        <td>
                            <select class="form-select form-select-sm" onchange="updateStatus(${order.id}, this.value)" style="width: auto;">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                                <option value="preparing" ${order.status === 'preparing' ? 'selected' : ''}>Preparing</option>
                                <option value="ready" ${order.status === 'ready' ? 'selected' : ''}>Ready</option>
                                <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                            </select>
                        </td>
                    </tr>
                `).join('');
                
                // Update pagination
                currentPage = page;
                updatePagination(data.pages, data.current_page);
                
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }
        
        function updatePagination(totalPages, currentPage) {
            const pagination = document.getElementById('pagination');
            let html = '';
            
            for (let i = 1; i <= totalPages; i++) {
                html += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="loadOrders(${i}); return false;">${i}</a>
                    </li>
                `;
            }
            
            pagination.innerHTML = html;
        }
        
        async function updateStatus(orderId, newStatus) {
            try {
                const headers = {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                };
                
                const response = await fetch(`${API_URL}/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: headers,
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (response.ok) {
                    loadOrders(currentPage);
                } else {
                    const data = await response.json();
                    alert(data.error || 'Error updating status');
                    loadOrders(currentPage);
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating status');
                loadOrders(currentPage);
            }
        }
        
        function logout() {
            localStorage.removeItem('admin_token');
            window.location.href = 'login.html';
        }
        
        // Load orders on page load
        loadOrders();
    </script>
</body>
</html>
